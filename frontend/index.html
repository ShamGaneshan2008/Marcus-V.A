<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus AI Interface</title>

    <!-- This links to your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ai-container">

        <!-- THE ORB SECTION -->
        <div class="orb-wrapper">
            <div class="core-glow"></div>
            <div class="glass-sphere">
                <!-- Pause Symbol (The Eyes) -->
                <div class="pause-icon">
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
        </div>

        <!-- THE TEXT -->
        <div class="status-text">I'm here to help!</div>

        <!-- THE WAVEFORM -->
        <div class="wave-container" id="waveContainer">
            <!-- Bars generated by JS -->
        </div>

    </div>

    <script>
        const waveContainer = document.getElementById('waveContainer');
        const numberOfBars = 40; // Total bars for the wave

        // Generate symmetric wave bars
        for (let i = 0; i < numberOfBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';

            // Calculate distance from center to create the bell curve shape
            const center = numberOfBars / 2;
            const distance = Math.abs(i - center);

            // Normalized distance (0 at center, 1 at edges)
            const maxDist = numberOfBars / 2;
            const normalizedDist = distance / maxDist;

            // Height calculation: Tall in center (40px), short at edges (5px)
            const height = 40 * Math.pow(1 - normalizedDist, 2);

            // Ensure minimum height
            const finalHeight = Math.max(5, height);

            // Set CSS variable for max height in animation
            bar.style.setProperty('--max-height', `${finalHeight}px`);

            // Randomize animation speed slightly for organic feel
            const speed = 0.4 + Math.random() * 0.4;
            const delay = Math.random() * -2; // Start at random positions

            bar.style.animationDuration = `${speed}s`;
            bar.style.animationDelay = `${delay}s`;

            waveContainer.appendChild(bar);
        }
    </script>
</body>
</html>
