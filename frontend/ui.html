<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus AI</title>

    <!-- Fonts (Manrope - similar to Claude) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-main: #1a1a1a;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --hover-bg: #f0f0f0;
            --orb-glow: none;
        }

        [data-theme="dark"] {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --hover-bg: #1a1a1a;
            --orb-glow: drop-shadow(0 0 40px rgba(0, 200, 255, 0.25)) drop-shadow(0 0 80px rgba(100, 0, 255, 0.2));
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Manrope', sans-serif;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            transition: background-color 0.6s ease, color 0.6s ease;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 300px; height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }

        .sidebar-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        .sidebar-btn {
            width: 100%; padding: 0.75rem 1rem; border: none; background: none; text-align: left;
            font-size: 0.95rem; font-family: 'Manrope', sans-serif; cursor: pointer; border-radius: 10px;
            margin-bottom: 0.25rem; transition: background 0.2s; display: flex; align-items: center; gap: 12px;
            color: var(--text-main);
        }
        .sidebar-btn:hover { background: var(--hover-bg); }

        .sidebar-btn.active {
            background: var(--hover-bg);
            font-weight: 600;
        }

        .chat-history-item {
            padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 0.25rem; cursor: pointer;
            font-size: 0.9rem; color: var(--text-muted); transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-history-item:hover { background: var(--hover-bg); color: var(--text-main); }
        .chat-history-item .delete-icon { opacity: 0; transition: opacity 0.2s; }
        .chat-history-item:hover .delete-icon { opacity: 1; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 150;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .overlay.open { opacity: 1; pointer-events: auto; }

        /* Main Content */
        #main-content {
            flex: 1; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Header UI */
        .header-left {
            position: absolute; top: 1.5rem; left: 1.5rem; z-index: 10;
            display: flex; align-items: center; gap: 1rem;
        }
        .menu-icon {
            width: 24px; height: 20px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-icon span {
            display: block; width: 100%; height: 2px;
            background: var(--text-main); transition: all 0.3s;
        }

        /* Branding Group */
        .branding-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-text {
            font-size: 1.5rem; font-weight: 700; color: var(--text-main);
            letter-spacing: -0.02em; transition: color 0.3s;
        }

        .ai-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background-color: #000000;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        [data-theme="dark"] .ai-box {
            background-color: #ffffff;
            color: #000000;
        }

        /* The Orb Container */
        #canvas-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -55%);
            width: 300px; height: 300px; z-index: 1;
            filter: var(--orb-glow);
            transition: filter 1s ease;
        }
        @media (min-width: 768px) {
            #canvas-container { width: 420px; height: 420px; }
        }

        /* Bottom UI */
        .ui-layer { position: absolute; bottom: 15%; z-index: 10; text-align: center; }
        .title-main { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main); }
        .title-sub { font-size: 0.9rem; color: var(--text-muted); font-weight: 400; }

        .mic-btn {
            margin-top: 2rem; width: 64px; height: 64px; border-radius: 50%;
            background: var(--text-main); border: none; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.3s; position: relative; overflow: visible;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .mic-btn svg { width: 24px; height: 24px; fill: var(--bg); transition: fill 0.3s; }
        .mic-btn:hover { transform: scale(1.05); }
        .mic-btn.active { transform: scale(1.1); }

        .mic-btn::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid var(--text-main);
            opacity: 0; transform: scale(1);
            animation: none;
        }
        .mic-btn.active::after {
            animation: ripple 1.5s infinite;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; margin-top: 1rem;
            border-top: 1px solid var(--border-color);
            margin-left: -1.5rem;
            margin-right: -1.5rem;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #000000; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <span>Menu</span>
            <button id="close-sidebar" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1.2rem;">&times;</button>
        </div>

        <button class="sidebar-btn active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
        </button>

        <button class="sidebar-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
            Memory
        </button>

        <div class="sidebar-section-title">Chat History</div>
        <div id="history-list">
            <div class="chat-history-item">
                <span>Project Planning</span>
                <span class="delete-icon" style="font-size:0.8rem;">&times;</span>
            </div>
            <div class="chat-history-item">
                <span>Dinner Ideas</span>
                <span class="delete-icon" style="font-size:0.8rem;">&times;</span>
            </div>
            <div class="chat-history-item">
                <span>Tech Support</span>
                <span class="delete-icon" style="font-size:0.8rem;">&times;</span>
            </div>
        </div>

        <div style="margin-top: auto;">
            <div class="toggle-container">
                <span style="font-size: 0.9rem; color: var(--text-main);">Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="sidebar-btn" style="margin-top:0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Settings
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="main-content">
        <!-- Header -->
        <header class="header-left">
            <div class="menu-icon" id="menu-toggle"><span></span><span></span><span></span></div>
            <div class="branding-group">
                <div class="logo-text">Marcus</div>
                <div class="ai-box">AI</div>
            </div>
        </header>

        <!-- The Orb -->
        <div id="canvas-container"></div>

        <div class="ui-layer">
            <h1 class="title-main" id="status-text">Tap to talk</h1>
            <p class="title-sub">Marcus - Warm and grounded</p>
            <button class="mic-btn" id="action-btn" aria-label="Activate Microphone">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.31 2.69 6 6 6s6-2.69 6-6h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- State ---
        const state = {
            darkMode: false,
            listening: false
        };

        // --- DOM ---
        const container = document.getElementById('canvas-container');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menu-toggle');
        const closeSidebar = document.getElementById('close-sidebar');
        const themeToggle = document.getElementById('theme-toggle');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');

        const toggleSidebar = (show) => {
            if(show) {
                sidebar.classList.add('open');
                overlay.classList.add('open');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
            }
        };

        menuToggle.addEventListener('click', () => toggleSidebar(true));
        overlay.addEventListener('click', () => toggleSidebar(false));
        closeSidebar.addEventListener('click', () => toggleSidebar(false));

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Ensure size is set correctly
        const width = container.clientWidth;
        const height = container.clientHeight;
        renderer.setSize(width, height);
        container.appendChild(renderer.domElement);

        // --- Groups ---
        const orbGroup = new THREE.Group();
        scene.add(orbGroup);

        // --- Shader: Robust Glass / Plasma Core ---
        const vertexShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying vec2 vUv;
            varying vec3 vWorldPosition;

            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            uniform float uIsDark;
            uniform float uIntensity;

            varying vec3 vNormal;
            varying vec3 vViewPosition;
            varying vec2 vUv;
            varying vec3 vWorldPosition;

            void main() {
                vec3 viewDir = normalize(vViewPosition);
                vec3 n = vNormal;

                // Fresnel
                float fresnel = pow(1.0 - abs(dot(viewDir, n)), 3.0);

                // Refraction Simulation
                float ior = 0.92;
                float dispersion = 0.05;
                vec3 refractR = refract(viewDir, n, ior - dispersion);
                vec3 refractG = refract(viewDir, n, ior);
                vec3 refractB = refract(viewDir, n, ior + dispersion);

                // Colors
                vec3 colBlue = vec3(0.1, 0.4, 1.0);
                vec3 colPurple = vec3(0.9, 0.2, 0.8);
                vec3 colOrange = vec3(1.0, 0.4, 0.0);

                // Mix Rainbow
                float mixFactorR = dot(refractR, vec3(0.0, 1.0, 0.0)) * 0.5 + 0.5;
                float mixFactorG = dot(refractG, vec3(1.0, 0.0, 0.0)) * 0.5 + 0.5;
                float mixFactorB = dot(refractB, vec3(0.0, 0.0, 1.0)) * 0.5 + 0.5;

                vec3 rainbow;
                rainbow.r = mix(colOrange.r, colPurple.r, mixFactorR);
                rainbow.g = mix(colBlue.g, colPurple.g, mixFactorG);
                rainbow.b = mix(colBlue.b, colPurple.b, mixFactorB);

                // Lighting
                vec3 lightPos = vec3(2.0, 3.0, 4.0);
                vec3 l = normalize(lightPos - vWorldPosition);
                float lensSpot = pow(max(dot(n, l), 0.0), 8.0);
                float internalGlow = pow(max(dot(n, -l), 0.0), 2.0);
                float spec = pow(max(dot(n, normalize(l + viewDir)), 0.0), 256.0);

                // --- LIGHT MODE ---
                if(uIsDark < 0.5) {
                    vec3 baseColor = vec3(1.0);
                    baseColor = mix(baseColor, rainbow, fresnel * 0.9);
                    baseColor += vec3(1.0, 0.9, 0.9) * lensSpot * 0.8;
                    baseColor += colPurple * internalGlow * 0.15;
                    baseColor += vec3(1.0) * spec * 1.5;

                    float pulse = 1.0 + sin(uTime * 2.0) * 0.02 * uIntensity;
                    baseColor *= pulse;

                    float alpha = fresnel * 0.95 + 0.05;
                    gl_FragColor = vec4(baseColor, alpha);
                }

                // --- DARK MODE (Plasma Core) ---
                else {
                    float time = uTime * 0.8;
                    // Simplified noise using sin/cos
                    float noise1 = sin(vUv.x * 10.0 + time) * cos(vUv.y * 10.0 + time);
                    float noise2 = sin(vUv.x * 5.0 - time * 1.5) * cos(vUv.y * 5.0 + time * 0.5);

                    float core = 1.0 - fresnel;
                    core = pow(core, 1.2);

                    vec3 plasma = mix(colBlue, colPurple, noise1 * 0.5 + 0.5);
                    plasma += colOrange * pow(noise2 * 0.5 + 0.5, 3.0) * 0.8;

                    vec3 finalColor = plasma * core * 2.0;
                    finalColor += rainbow * fresnel * 1.5;
                    finalColor += vec3(1.0) * pow(core, 4.0) * 0.5;

                    float alpha = 0.9 + 0.1 * sin(uTime * 3.0);
                    alpha += noise1 * 0.05;

                    gl_FragColor = vec4(finalColor, alpha);
                }
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uIsDark: { value: 0 },
                uIntensity: { value: 0 }
            },
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        // Main Orb
        const geometry = new THREE.SphereGeometry(1.2, 128, 128);
        const orb = new THREE.Mesh(geometry, material);
        orbGroup.add(orb);

        // --- Particle Ring ---
        const particleCount = 150;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for(let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const radius = 1.7 + Math.random() * 0.5;
            positions[i * 3] = Math.cos(angle) * radius;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
            positions[i * 3 + 2] = Math.sin(angle) * radius;

            const colorChoice = Math.random();
            if(colorChoice < 0.33) {
                colors[i*3] = 0.1; colors[i*3+1] = 0.4; colors[i*3+2] = 1.0;
            } else if (colorChoice < 0.66) {
                colors[i*3] = 0.9; colors[i*3+1] = 0.2; colors[i*3+2] = 0.8;
            } else {
                colors[i*3] = 1.0; colors[i*3+1] = 0.4; colors[i*3+2] = 0.1;
            }
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        orbGroup.add(particles);

        // --- Animation ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            material.uniforms.uTime.value = elapsed;

            const targetDark = state.darkMode ? 1.0 : 0.0;
            const targetIntensity = state.listening ? 1.0 : 0.0;

            material.uniforms.uIsDark.value += (targetDark - material.uniforms.uIsDark.value) * 0.05;
            material.uniforms.uIntensity.value += (targetIntensity - material.uniforms.uIntensity.value) * 0.05;

            particleMaterial.opacity = material.uniforms.uIsDark.value * 0.8;

            orbGroup.rotation.y = elapsed * 0.15;
            particles.rotation.y = -elapsed * 0.3;
            particles.rotation.x = Math.sin(elapsed * 0.5) * 0.2;

            var scale = 1.0 + Math.sin(elapsed * 0.5) * 0.01;
            orb.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }
        animate();

        // --- Interaction ---
        themeToggle.addEventListener('change', () => {
            state.darkMode = themeToggle.checked;
            document.body.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
        });

        actionBtn.addEventListener('click', () => {
            state.listening = !state.listening;
            if (state.listening) {
                actionBtn.classList.add('active');
                statusText.textContent = "Listening...";
            } else {
                actionBtn.classList.remove('active');
                statusText.textContent = "Tap to talk";
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
        });
    </script>
</body>
</html>
